spring.application.name=api-gateway
server.port=8080
spring.cloud.config.uri=http://localhost:8888
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# This tells Spring exactly where the Config Server lives
spring.config.import=optional:configserver:http://localhost:8888
# Enable service discovery routing
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Simple test route: Redirect /eureka-ui to the Eureka dashboard
spring.cloud.gateway.routes[0].id=eureka-route
spring.cloud.gateway.routes[0].uri=http://localhost:8761
spring.cloud.gateway.routes[0].predicates[0]=Path=/eureka-ui/**