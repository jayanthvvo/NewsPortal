spring.application.name=api-gateway
server.port=8080

# 1. Connect to Config Server & Eureka
spring.config.import=optional:configserver:http://localhost:8888
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 2. Tell the Gateway to use Eureka to find other services
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ==========================================
# ROUTING RULES
# ==========================================

# Route 1: Auth Service (Register and Login)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/admin/**

# Route 2: Test route for Eureka UI
spring.cloud.gateway.routes[1].id=eureka-route
spring.cloud.gateway.routes[1].uri=http://localhost:8761
spring.cloud.gateway.routes[1].predicates[0]=Path=/eureka-ui/**

# Route : Article-Service
spring.cloud.gateway.routes[2].id=article-service
spring.cloud.gateway.routes[2].uri=lb://article-service
#If request URL starts with /articles/
spring.cloud.gateway.routes[2].predicates[0]=Path=/articles/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[3].id=category-service
spring.cloud.gateway.routes[3].uri=lb://category-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/categories/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter


# Route 5: Comment-Service
spring.cloud.gateway.routes[4].id=comment-service
spring.cloud.gateway.routes[4].uri=lb://comment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/comments/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[5].id=user-service
spring.cloud.gateway.routes[5].uri=lb://user-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter


# Route 7: Alert-Service
# Add this to your api-gateway properties
spring.cloud.gateway.routes[6].id=alert-service
spring.cloud.gateway.routes[6].uri=lb://alert-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/alerts/**
spring.cloud.gateway.routes[6].filters[0]=AuthenticationFilter