spring.application.name=api-gateway
server.port=8080

# 1. Connect to Config Server & Eureka
spring.config.import=optional:configserver:http://localhost:8888
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 2. Tell the Gateway to use Eureka to find other services
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ==========================================
# ROUTING RULES
# ==========================================

# Route 1: Auth Service (Register and Login)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/admin/**

# Route 2: Test route for Eureka UI
spring.cloud.gateway.routes[1].id=eureka-route
spring.cloud.gateway.routes[1].uri=http://localhost:8761
spring.cloud.gateway.routes[1].predicates[0]=Path=/eureka-ui/**

# Route : Article-Service
spring.cloud.gateway.routes[2].id=article-service
spring.cloud.gateway.routes[2].uri=lb://article-service
#If request URL starts with /articles/
spring.cloud.gateway.routes[2].predicates[0]=Path=/articles/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter
